<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Gathering - Seating Guide</title>
<style>
:root{--purple:#39236a;--lav:#b79ad7;--gold:#b88935;--cream:#fffaf0;}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;background:linear-gradient(180deg,#f8f0ff,#fffaf0);color:#3c2b24}
header{text-align:center;padding:22px 16px 12px}
.chapter{color:var(--purple);letter-spacing:.16em;font-size:14px}
h1{margin:6px 0 4px;font-size:32px;font-weight:500;color:var(--purple)}
.sub{font-size:15px;color:#6f5a4d}
.wrap{max-width:1160px;margin:0 auto;padding:10px 10px 34px}
.map{position:relative;width:100%;border-radius:18px;overflow:hidden;box-shadow:0 14px 40px rgba(70,40,100,.18);border:2px solid rgba(184,137,53,.55);background:#fff}
.map img{width:100%;display:block}
.hotspot{
  position:absolute;
  transform:translate(-50%,-50%);
  width:9.2%;
  height:auto;
  aspect-ratio:2.7 / 1;

  min-width:0;
  min-height:0;

  padding:0;
  border-radius:999px;
  border:2px solid rgba(184,137,53,.95);
  background:rgba(255,250,240,.72);
  color:var(--purple);

  font-size:clamp(6px,1.05vw,15px);
  font-weight:bold;
  letter-spacing:.01em;
  line-height:1;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
  box-shadow:
    0 0 0 .18vw rgba(255,255,255,.35),
    0 .25vw .7vw rgba(77,48,103,.16);

  z-index:5;
  touch-action:manipulation;
  white-space:nowrap;
  overflow:visible;
}
.hotspot:hover,.hotspot:focus{background:rgba(87,57,134,.88);color:white;outline:none}
.hint{text-align:center;margin:14px 0 0;font-size:14px;color:#6f5a4d}
dialog{width:min(92vw,560px);border:none;border-radius:24px;padding:0;overflow:hidden;box-shadow:0 24px 70px rgba(45,25,65,.34);background:var(--cream)}
dialog::backdrop{background:rgba(36,20,48,.45);backdrop-filter:blur(3px)}
.modal-head{padding:20px 20px 14px;text-align:center;background:linear-gradient(135deg,#f8efff,#fffaf0);border-bottom:1px solid rgba(184,137,53,.35)}
.modal-head .icon{font-size:26px;color:var(--gold)}
.modal-head h2{margin:4px 0 2px;color:var(--purple);font-size:30px;letter-spacing:.06em}
.modal-body{padding:20px}
.round-table{width:250px;height:250px;margin:0 auto 18px;position:relative;border-radius:50%;border:2px solid rgba(184,137,53,.55);background:radial-gradient(circle,#fffdf7 0 45%,#f7ecff 46% 100%)}
.seat{position:absolute;width:78px;min-height:40px;padding:5px 6px;border-radius:12px;background:white;border:1px solid rgba(184,137,53,.55);font-size:11px;text-align:center;line-height:1.25;box-shadow:0 4px 10px rgba(90,60,100,.12);cursor:pointer}
.seat strong{color:var(--purple);display:block;font-size:12px}
.guest-list{display:grid;gap:8px}
.guest{padding:10px 12px;border:1px solid rgba(184,137,53,.35);border-radius:14px;background:white;cursor:pointer}
.guest:hover{background:#f5effc}
.selected{background:#5a3b87!important;color:white!important;border-color:#5a3b87!important}
.selected strong{color:white}
.close{width:100%;border:0;background:#5a3b87;color:white;padding:14px;font-size:16px;cursor:pointer}
.note{text-align:center;color:#6f5a4d;font-size:13px;margin-top:8px}
@media (max-width: 640px) {

  header{
    padding:18px 14px 10px;
  }

  .chapter{
    font-size:13px;
  }

  h1{
    font-size:34px;
    margin:4px 0 10px;
  }

  .sub{
    font-size:18px;
    line-height:1.8;
    padding:0 14px;
  }

  .wrap{
    padding:8px 14px 26px;
  }

  /* 席次表を少し小さく */
  .map{
  width:min(100%, 900px);
  margin:0 auto;
}
  
  .hotspot{
  border-width:1px;

  box-shadow:
    0 0 0 1px rgba(255,255,255,.35),
    0 2px 6px rgba(77,48,103,.12);
}
  
  .hint{
    font-size:15px;
    line-height:1.7;
    padding:0 14px;
  }

  /* 卓詳細をスクロール可能に */
  dialog{
    width:92vw;
    max-height:82vh;
    overflow:hidden;
  }

  .modal-body{
    max-height:58vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:16px;
  }

  .modal-head{
    padding:16px 14px 10px;
  }

  .modal-head h2{
    font-size:26px;
  }

.round-table{
  width:260px;
  height:260px;
  margin:18px auto 26px;
}

.seat{
  width:58px;
  height:58px;
  min-height:58px;
  padding:4px;
  border-radius:50%;
  font-size:9px;
  line-height:1.15;
}

.seat strong{
  font-size:15px;
  margin-bottom:2px;
}

  .guest{
    font-size:14px;
    padding:9px 10px;
  }

  .close{
    position:sticky;
    bottom:0;
  }
}
</style>
</head>
<body>
<header>
  <div class="chapter">CHAPTER I</div>
  <h1>The Gathering</h1>
  <div class="sub">
卓をタップすると<br>
お席の詳細をご確認いただけます
</div>
</header>

<div class="wrap">
  <div class="map">
    <img src="seating-guide.png" alt="席次表">
    <button class="hotspot" style="left:43.0%;top:28.5%;" data-table="MICKEY">MICKEY</button>
<button class="hotspot" style="left:59.0%;top:28.5%;" data-table="MINNIE">MINNIE</button>
<button class="hotspot" style="left:40.4%;top:40.8%;" data-table="DONALD">DONALD</button>
<button class="hotspot" style="left:51.0%;top:44.7%;" data-table="PLUTO">PLUTO</button>
<button class="hotspot" style="left:61.3%;top:40.8%;" data-table="DAISY">DAISY</button>
<button class="hotspot" style="left:42.0%;top:55.5%;" data-table="DALE">DALE</button>
<button class="hotspot" style="left:59.8%;top:55.5%;" data-table="CHIP">CHIP</button>
<button class="hotspot" style="left:51.0%;top:62%;" data-table="GOOFY">GOOFY</button>
  </div>
  <p class="hint">※お名前をタップすると、その席がハイライトされます</p>
</div>

<dialog id="seatDialog">
  <div class="modal-head">
    <div class="icon">✦</div>
    <h2 id="tableTitle">MICKEY</h2>
    <div id="tableCount"></div>
  </div>
  <div class="modal-body">
    <div class="round-table" id="roundTable"></div>
    <div class="guest-list" id="guestList"></div>
    <p class="note">席番号は仮配置です。実際の座席順に合わせて調整できます。</p>
  </div>
  <button class="close" id="closeBtn">閉じる</button>
</dialog>

<script>
const TABLES = {
"MICKEY":   {
  list: ["谷口 昂汰 様", "中山 耕祐 様", "當間 直人 様", "松沢 宗紀 様", "黒江 健斗 様", "福盛 涼 様", "蓬莱 佳佑 様", "吉留 嗣拡 様"],
  seats:["當間 直人 様", "松沢 宗紀 様", "谷口 昂汰 様", "中山 耕祐 様", "吉留 嗣拡 様", "蓬莱 佳佑 様", "黒江 健斗 様", "福盛 涼 様"]
  },
 "PLUTO": {
  list: ["加藤 湖奈未 様", "黒木 優也 様", "黒木 美咲 様", "黒木 若葉 ちゃん", "松﨑 将也 様", "湯地 涼介 様"], 
  seats:["松﨑 将也 様", "湯地 涼介 様", "黒木 優也 様", "黒木 若葉 ちゃん", "黒木 美咲 様", "加藤 湖奈未 様"]
  },
 "DONALD":  {
  list: ["井 健嗣 様", "黒江 健斗 様", "小林 凌 様", "下井倉 慶紀 様", "下村 太喜 様", "杣川 拳一 様", "福盛 涼 様", "松元 佳汰 様"], 
  seats:["下村 太喜 様", "下吉 智陽 様", "松元 佳汰 様", "庄屋 祐紀 様", "杣川 拳一 様", "井 健嗣 様", "下井倉 慶紀 様", "小林 凌 様"]
  },
 "DALE": {
  list: ["花薗 寿紀 様", "花薗 隆太 様", "花薗 由梨奈 様", "花薗 穂風 ちゃん", "花薗 満寿美", "花薗 隆明"], 
  seats: ["花薗 由梨奈 様", "花薗 寿紀 様", "花薗 満寿美 様", "花薗 隆明 様", "花薗 隆太 様", "花薗 穂風 ちゃん"]
  },
 "GOOFY": {
  list: ["荒武 覚 様","平山 さおり 様","堀之内 紫昭 様","堀之内 みや子 様", "花薗 立子 様"],
  seats: ["荒武 覚 様", "堀之内 みや子 様" , "堀之内 紫昭 様", "花薗 立子 様", "平山 さおり 様"]
},
 "MINNIE": {
  list: ["中野 龍介 様", "中野 峻 様", "伊橋 優人 様", "新竹 哲明 様", "今井 梨佳 様", "津村 育美 様", "林 愛美 様", "安田 千尋 様", "安田 大貴 様"], 
  seats: ["中野 峻 様", "中野 龍介 様", "新竹 哲明 様", "伊橋 優人 様", "安田 大貴 様", "安田 千尋 様", "林 愛美 様", "今井 梨佳 様", "津村 育美 様"]
},
 "DAISY": {
  list: ["小屋 あかり 様", "小屋 勇太 様", "津田 涼賀 様", "豊高 裕 様", "中島 健汰 様", "濵崎 愛菜 様", "濵崎 佑太 様", "林 民和 様", "向笠 眞琴 様"],
  seats: ["小屋 あかり 様", "小屋 勇太 様", "豊高 裕 様", "中島 健汰 様", "向笠 眞琴 様", "林 民和 様", "津田 涼賀 様", "濵崎 佑太 様", "濵崎 愛菜 様"]
},
  "CHIP":  {
  list: ["工藤 賢太 様", "工藤 雅子 様", "工藤 スミエ 様", "勝又 千晴 様", "勝又 洋貴 様", "勝又 絹代", "勝又 千晶"],
  seats: ["工藤 賢太 様", "勝又 洋貴 様", "勝又 千晴 様", "勝又 千晶", "勝又 絹代", "工藤 スミエ 様", "工藤 雅子 様"]
}
};

function seatPosition(i,n){
  const isMobile = window.innerWidth <= 640;

  const size = isMobile ? 260 : 250;
  const seatSize = isMobile ? 58 : 78;

  const cx = size / 2;
  const cy = size / 2;
  const r = isMobile ? 108 : 118;

  // 角度指定：-90 が上、0 が右、90 が下、180 が左
  const anglePatterns = {
    5:  [-150, -30, 35, 90, 145],
    6:  [-150, -40, 10, 60, 110, 160],
    7:  [-90, -40, 10, 65, 120, 170, -140],
    8:  [-150, -105, -55, -10, 35, 80, 125, 170],
    9:  [-160, -120, -80, -40, 0, 40, 80, 120, 160]
  };

  const angles = anglePatterns[n];

  let angleDeg;

  if (angles) {
    angleDeg = angles[i];
  } else {
    angleDeg = -90 + (360 / Math.max(n,1)) * i;
  }

  const angle = angleDeg * Math.PI / 180;

  return {
    left: cx + Math.cos(angle) * r - seatSize / 2,
    top: cy + Math.sin(angle) * r - seatSize / 2
  };
}

function openTable(key){
  const tableData = TABLES[key] || { list: [], seats: [] };

  const listGuests = tableData.list || [];
  const seatGuests = tableData.seats || listGuests;

  document.getElementById('tableTitle').textContent = key;
  document.getElementById('tableCount').textContent = listGuests.length + "名";

  const round = document.getElementById('roundTable');
  const list = document.getElementById('guestList');
  round.innerHTML = "";
  list.innerHTML = "";

  seatGuests.forEach((name, i) => {
    const pos = seatPosition(i, seatGuests.length);

    const seat = document.createElement('button');
    seat.type = 'button';
    seat.className = 'seat';
    seat.style.left = pos.left + 'px';
    seat.style.top = pos.top + 'px';
    seat.dataset.name = name;
    seat.innerHTML = name;
    seat.addEventListener('click', () => selectSeatByName(name));
    round.appendChild(seat);
  });

  listGuests.forEach((name) => {
    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'guest';
    row.dataset.name = name;
    row.textContent = name;
    row.addEventListener('click', () => selectSeatByName(name));
    list.appendChild(row);
  });

  document.getElementById('seatDialog').showModal();
}
function selectSeatByName(name){
  document.querySelectorAll('.seat,.guest').forEach(el => {
    el.classList.toggle('selected', el.dataset.name === name);
  });
}

document.querySelectorAll('.hotspot').forEach(btn=>{
  btn.addEventListener('click',()=>openTable(btn.dataset.table));
  btn.addEventListener('touchstart',(e)=>{ e.preventDefault(); openTable(btn.dataset.table); }, {passive:false});
});

document.getElementById('closeBtn').addEventListener('click',()=>{
  document.getElementById('seatDialog').close();
});
</script>
</body>
</html>
